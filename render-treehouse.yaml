services:
  - type: web
    name: ombre-brain-treehouse
    runtime: python
    region: singapore
    plan: starter

    # 不随仓库提交自动重新部署，由我们手动决定何时升级
    autoDeployTrigger: off

    buildCommand: pip install --require-hashes -r requirements.lock.txt
    startCommand: python src/server.py
    healthCheckPath: /health

    envVars:
      - key: OMBRE_TRANSPORT
        value: streamable-http

      - key: OMBRE_EMBED_BACKEND
        value: api

      # Render 自动生成初始 Dashboard 密码
      - key: OMBRE_DASHBOARD_PASSWORD
        generateValue: true

      # 所有记忆、配置和派生索引都写进持久盘
      - key: OMBRE_VAULT_DIR
        value: /opt/render/project/src/buckets

      - key: OMBRE_CONFIG_PATH
        value: /opt/render/project/src/buckets/config.yaml

    disk:
      name: ombre-buckets
      mountPath: /opt/render/project/src/buckets
      sizeGB: 5
